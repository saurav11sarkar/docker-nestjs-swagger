version: '3.9'

services:
  app:
    build:
      context: .
      target: development
    container_name: nestjs_app
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
