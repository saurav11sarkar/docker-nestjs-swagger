name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-app
  NODE_VERSION: '20'

jobs:

# ════════════════════════════════════════
#  JOB 1 — TEST
# ════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          PORT: 5000
          MONGO_URI: mongodb://localhost/testdb
          JWT_SECRET: test-jwt-secret-ci
          JWT_EXPIRE: 1h
          ACCESS_TOKEN_SECRET: test-access-secret-ci
          ACCESS_TOKEN_EXPIRES: 7d
          REFRESH_TOKEN_SECRET: test-refresh-secret-ci
          REFRESH_TOKEN_EXPIRES: 90d
          BCRYPT_SALT_ROUNDS: 10
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          EMAIL_EXPIRES: 900000
          EMAIL_HOST: smtp.gmail.com
          EMAIL_PORT: 587
          EMAIL_ADDRESS: test@test.com
          EMAIL_PASS: test
          EMAIL_FROM: test@test.com
          EMAIL_TO: ''
          ADMIN_EMAIL: admin@test.com
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_PLATFORM_ACCOUNT_ID: acct_dummy
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_MAPS_API_KEY: test-maps-key
          MPESA_BASE_URL: https://sandbox.safaricom.co.ke
          CONSUMER_KEY: test
          CONSUMER_SECRET: test
          SHORTCODE: test
          PASSKEY: test
          CALLBACK_URL: http://localhost:5000/callback
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:5000/api/v1

# ════════════════════════════════════════
#  JOB 2 — BUILD & PUSH
# ════════════════════════════════════════
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

